services:
  aigateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aigateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DB_PATH: /data/aigateway.db
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      PROXY_TIMEOUT: 60s
    volumes:
      - aigateway-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  aigateway-data:
