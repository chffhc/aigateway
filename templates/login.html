<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI Gateway</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h1 class="text-2xl font-bold text-center mb-6">🍮 AI Gateway</h1>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">用户名</label>
                <input type="text" id="username" required
                    class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">密码</label>
                <input type="password" id="password" required
                    class="w-full border rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition">
                登录
            </button>
        </form>
        <p id="error" class="text-red-500 text-sm mt-4 hidden"></p>
        <p class="text-center mt-4 text-sm text-gray-500">
            还没有账号？<a href="#" onclick="showRegister()" class="text-blue-600">注册</a>
        </p>

        <div id="registerForm" class="space-y-4 hidden mt-4 pt-4 border-t">
            <h2 class="text-lg font-semibold">注册</h2>
            <input type="text" id="regUsername" placeholder="用户名" required
                class="w-full border rounded px-3 py-2">
            <input type="password" id="regPassword" placeholder="密码" required
                class="w-full border rounded px-3 py-2">
            <input type="email" id="regEmail" placeholder="邮箱（可选）"
                class="w-full border rounded px-3 py-2">
            <button onclick="register()"
                class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
                注册
            </button>
            <button onclick="showLogin()" class="w-full text-gray-500 text-sm">
                返回登录
            </button>
        </div>
    </div>

    <script>
        const API = window.location.origin;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('apiKey', 'login-success');
                    localStorage.setItem('userData', JSON.stringify(data.data));
                    if (data.data.role === 'admin') {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/dashboard';
                    }
                } else {
                    showError(data.error || '登录失败');
                }
            } catch (err) {
                showError('网络错误');
            }
        });

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const email = document.getElementById('regEmail').value;

            try {
                const res = await fetch(`${API}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });
                const data = await res.json();

                if (res.ok) {
                    alert('注册成功！请登录');
                    showLogin();
                } else {
                    showError(data.error || '注册失败');
                }
            } catch (err) {
                showError('网络错误');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function showRegister() {
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }
    </script>
</body>
</html>
