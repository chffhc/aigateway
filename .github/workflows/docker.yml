name: docker

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_IMAGE != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image list
        id: images
        run: |
          {
            echo "images<<EOF"
            echo "ghcr.io/${{ env.IMAGE_NAME }}"
            if [ -n "${{ env.DOCKERHUB_IMAGE }}" ]; then
              echo "${{ env.DOCKERHUB_IMAGE }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.images }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' }}

      - name: Image digest
        run: echo ${{ steps.build.outputs.digest }}

      - name: Export digest artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p dist
          printf '%s\n' '${{ steps.build.outputs.digest }}' > dist/image-digest.txt

      - name: Upload digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: dist/image-digest.txt

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          {
            echo "body<<EOF"
            echo "## Docker Images"
            echo
            echo "- GHCR: \`ghcr.io/${{ github.repository }}:${VERSION}\`"
            if [ -n "${{ env.DOCKERHUB_IMAGE }}" ]; then
              echo "- Docker Hub: \`${{ env.DOCKERHUB_IMAGE }}:${VERSION}\`"
            fi
            echo
            echo "## Multi-arch"
            echo
            echo "- linux/amd64"
            echo "- linux/arm64"
            echo
            echo "## Supply Chain"
            echo
            echo "- Manifest digest: \`${{ needs.docker.outputs.digest }}\`"
            echo "- SBOM: published as OCI attestation alongside the image"
            echo "- Provenance: published as OCI attestation alongside the image"
            echo
            echo "## Source"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: ${{ steps.notes.outputs.body }}
